<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pune Date Spots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f7f8;
            --card: #ffffff;
            --text: #101114;
            --muted: #5b606a;
            --stroke: rgba(16, 17, 20, 0.10);
            --shadow: 0 10px 30px rgba(16, 17, 20, 0.08);
            --accent: #ff3d6e;
            --accentSoft: rgba(255, 61, 110, 0.12);
            --bgBlob1: rgba(255, 61, 110, 0.18);
            --bgBlob2: rgba(255, 61, 110, 0.12);
            --bgBlob3: rgba(16, 17, 20, 0.10);
            /* Browsers cap custom cursors at ~32px; assets/heart.png is sized for that. */
            --cursor-heart: url("assets/heart.png") 16 16, pointer;
        }

        html[data-theme="dark"] {
            --bg: #0f1115;
            --card: #151923;
            --text: #f3f5f7;
            --muted: rgba(243, 245, 247, 0.68);
            --stroke: rgba(243, 245, 247, 0.12);
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
            --accent: #ff4d7d;
            --accentSoft: rgba(255, 77, 125, 0.16);
            --bgBlob1: rgba(255, 77, 125, 0.22);
            --bgBlob2: rgba(255, 77, 125, 0.14);
            --bgBlob3: rgba(243, 245, 247, 0.10);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            cursor: url("assets/heart.png") 16 16, auto;
        }

        input, textarea {
            cursor: text;
        }

        button, a, select, .date-card {
            cursor: var(--cursor-heart);
        }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .bg-anim {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-anim .blob {
            position: absolute;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            filter: blur(55px);
            opacity: 0.85;
            transform: translate3d(0,0,0);
            mix-blend-mode: multiply;
            animation: floatBlob 18s ease-in-out infinite;
        }

        html[data-theme="dark"] .bg-anim .blob {
            mix-blend-mode: screen;
            opacity: 0.55;
        }

        .bg-anim .blob.b1 {
            background: var(--bgBlob1);
            top: -160px;
            left: -180px;
            animation-duration: 20s;
        }

        .bg-anim .blob.b2 {
            background: var(--bgBlob2);
            bottom: -200px;
            right: -220px;
            animation-duration: 24s;
            animation-delay: -4s;
        }

        .bg-anim .blob.b3 {
            background: var(--bgBlob3);
            top: 30%;
            left: 55%;
            width: 440px;
            height: 440px;
            animation-duration: 28s;
            animation-delay: -10s;
        }

        @keyframes floatBlob {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            35% { transform: translate3d(60px, 30px, 0) scale(1.08); }
            70% { transform: translate3d(-30px, 70px, 0) scale(0.98); }
            100% { transform: translate3d(0, 0, 0) scale(1); }
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
        }

        header {
            text-align: left;
            margin: 6px 0 18px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }

        .header-text {
            flex: 1;
            min-width: 0;
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border-radius: 999px;
            padding: 10px 12px;
            background: rgba(16, 17, 20, 0.06);
            border: 1px solid rgba(16, 17, 20, 0.06);
            color: var(--text);
            font-weight: 800;
            white-space: nowrap;
        }

        html[data-theme="dark"] .theme-toggle {
            background: rgba(243, 245, 247, 0.08);
            border: 1px solid rgba(243, 245, 247, 0.12);
        }

        .theme-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 4px var(--accentSoft);
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 6px;
            letter-spacing: -0.03em;
        }

        .subtitle {
            font-size: 1.05em;
            color: var(--muted);
        }

        .filter-section {
            background: var(--card);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .toolbar {
            display: grid;
            grid-template-columns: 2.2fr 1fr 1fr 1fr;
            gap: 12px;
            align-items: center;
        }

        .meta-row {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
            font-weight: 650;
            font-size: 0.95em;
        }

        .button {
            appearance: none;
            border: none;
            cursor: var(--cursor-heart);
            border-radius: 10px;
            padding: 12px 14px;
            font-weight: 700;
            background: var(--accent);
            color: white;
            transition: transform 0.08s ease, background 0.2s ease;
            white-space: nowrap;
        }

        .button:hover {
            background: #ff2a61;
        }

        .button:active {
            transform: translateY(1px);
        }

        .button.ghost {
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
        }

        html[data-theme="dark"] .button.ghost {
            background: rgba(243, 245, 247, 0.08);
            border: 1px solid rgba(243, 245, 247, 0.12);
        }

        @keyframes surpriseBurst {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 var(--accentSoft);
            }
            40% {
                transform: scale(1.06);
                box-shadow: 0 0 0 10px rgba(255, 61, 110, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 61, 110, 0);
            }
        }

        #randomBtn.surprise-burst {
            animation: surpriseBurst 0.45s ease-out forwards;
        }

        #randomBtn.surprise-burst:active {
            transform: none;
        }

        @media (prefers-reduced-motion: reduce) {
            #randomBtn.surprise-burst {
                animation: none;
            }
        }

        .filter-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 1em;
            border: 1px solid var(--stroke);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
        }

        html[data-theme="dark"] .filter-input {
            background: rgba(0, 0, 0, 0.18);
        }

        .filter-input:focus {
            border-color: rgba(255, 61, 110, 0.6);
            box-shadow: 0 0 0 4px var(--accentSoft);
        }

        select.filter-input {
            appearance: none;
            -webkit-appearance: none;
            padding-right: 38px;
            background-image:
                linear-gradient(45deg, transparent 50%, var(--muted) 50%),
                linear-gradient(135deg, var(--muted) 50%, transparent 50%);
            background-position:
                calc(100% - 18px) 50%,
                calc(100% - 12px) 50%;
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
        }

        /* Improve native dropdown readability in dark mode (browser support varies). */
        html[data-theme="dark"] select.filter-input,
        html[data-theme="dark"] select.filter-input option,
        html[data-theme="dark"] select.filter-input optgroup {
            background-color: #151923;
            color: #f3f5f7;
        }

        html[data-theme="dark"] select.filter-input option:checked {
            background-color: rgba(255, 77, 125, 0.22);
            color: #f3f5f7;
        }

        .filter-section {
            backdrop-filter: blur(10px);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            align-items: stretch;
            gap: 25px;
            margin-bottom: 30px;
        }

        .date-card {
            background: var(--card);
            border-radius: 15px;
            padding: 0;
            overflow: hidden;
            cursor: var(--cursor-heart);
            transition: all 0.3s ease;
            border: 1px solid var(--stroke);
            box-shadow: 0 2px 10px rgba(16, 17, 20, 0.05);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card-banner {
            position: relative;
            flex: 0 0 auto;
            aspect-ratio: 16 / 9;
            width: 100%;
            overflow: hidden;
            background: var(--stroke);
        }

        .card-banner-fallback {
            position: absolute;
            inset: 0;
        }

        .date-card.romantic .card-banner-fallback {
            background: linear-gradient(
                135deg,
                color-mix(in srgb, var(--accent) 55%, var(--card)),
                color-mix(in srgb, var(--accent) 22%, var(--bg))
            );
        }

        .date-card.foodie .card-banner-fallback {
            background: linear-gradient(
                135deg,
                color-mix(in srgb, #e8a317 50%, var(--card)),
                color-mix(in srgb, #e8a317 18%, var(--bg))
            );
        }

        .date-card.relaxing .card-banner-fallback {
            background: linear-gradient(
                135deg,
                color-mix(in srgb, #3d9a6a 48%, var(--card)),
                color-mix(in srgb, #3d9a6a 16%, var(--bg))
            );
        }

        .date-card.cultural .card-banner-fallback {
            background: linear-gradient(
                135deg,
                color-mix(in srgb, #6b5ce7 48%, var(--card)),
                color-mix(in srgb, #6b5ce7 16%, var(--bg))
            );
        }

        .card-banner-img {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-type--overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 2;
            margin-bottom: 0;
            background: color-mix(in srgb, var(--card) 82%, transparent);
            backdrop-filter: blur(8px);
            border: 1px solid var(--stroke);
            box-shadow: 0 2px 8px rgba(16, 17, 20, 0.12);
        }

        .card-body {
            padding: 18px 20px 20px;
            display: flex;
            flex-direction: column;
            flex: 1 1 auto;
            min-height: 132px;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .date-card .card-title {
            flex: 1;
            min-width: 0;
            margin-bottom: 0;
            font-size: 1.35em;
            line-height: 1.25;
        }

        .date-card .card-description {
            font-size: 0.95em;
        }

        .date-card .card-meta {
            margin-top: auto;
            padding-top: 12px;
            gap: 8px;
            flex-wrap: nowrap;
        }

        .date-card .badge {
            padding: 5px 9px;
            font-size: 0.82em;
            white-space: nowrap;
        }

        .date-card .fav-button {
            position: static;
            flex-shrink: 0;
        }

        .date-card:hover {
            transform: translateY(-5px);
            border-color: color-mix(in srgb, var(--accent) 50%, var(--stroke));
            box-shadow:
                var(--shadow),
                0 0 18px color-mix(in srgb, var(--accent) 55%, transparent),
                0 0 36px color-mix(in srgb, var(--accent) 35%, transparent),
                0 0 56px color-mix(in srgb, var(--accent) 18%, transparent);
        }

        .card-type {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.02em;
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
        }

        .card-title {
            font-size: 1.5em;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .card-description {
            color: var(--muted);
            line-height: 1.6;
        }

        .card-meta {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
            font-weight: 650;
            font-size: 0.9em;
        }

        .fav-button {
            position: absolute;
            top: 14px;
            right: 14px;
            border: none;
            border-radius: 999px;
            width: 34px;
            height: 34px;
            cursor: var(--cursor-heart);
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.08s ease, background 0.2s ease;
        }

        .fav-button:hover {
            background: var(--accentSoft);
        }

        .fav-button:active {
            transform: translateY(1px);
        }

        .fav-button.is-fav {
            background: var(--accentSoft);
            color: var(--accent);
        }

        .detail-view {
            display: none;
            background: var(--card);
            border-radius: 15px;
            padding: 40px;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
        }

        .detail-view.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-button {
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: var(--cursor-heart);
            font-size: 1em;
            margin-bottom: 25px;
            transition: background 0.2s ease, transform 0.08s ease;
        }

        .back-button:hover {
            background: rgba(16, 17, 20, 0.10);
        }

        .back-button:active {
            transform: translateY(1px);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 25px;
        }

        .detail-section {
            background: rgba(16, 17, 20, 0.04);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(16, 17, 20, 0.06);
        }

        .detail-section h3 {
            color: var(--text);
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .detail-title {
            font-size: 2.5em;
            color: var(--text);
            margin-bottom: 15px;
            letter-spacing: -0.03em;
        }

        .detail-blurb {
            font-size: 1.1em;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .detail-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 14px 0 22px;
        }

        .link-button {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }

        .photo-item {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(16, 17, 20, 0.08);
            box-shadow: 0 3px 10px rgba(16, 17, 20, 0.08);
        }

        .photo-item img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }

        .photo-placeholder {
            background: rgba(16, 17, 20, 0.06);
            border-radius: 10px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 1.2em;
        }

        .maps-preview {
            margin-top: 14px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(16, 17, 20, 0.08);
            background: white;
        }

        .maps-preview iframe {
            width: 100%;
            height: 280px;
            border: 0;
            display: block;
        }

        .photos-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            margin-top: 0;
        }

        .photos-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            background: rgba(16, 17, 20, 0.06);
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid rgba(16, 17, 20, 0.06);
        }

        .photos-links a:hover {
            background: rgba(16, 17, 20, 0.10);
        }

        .wheel-view {
            display: none;
            background: var(--card);
            border-radius: 15px;
            padding: 40px;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
        }

        .wheel-view.active {
            display: block;
        }

        .wheel-view-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .wheel-view-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .wheel-view-header p {
            color: var(--muted);
            line-height: 1.5;
        }

        .wheel-stage {
            position: relative;
            width: min(92vw, 420px);
            aspect-ratio: 1;
            margin: 0 auto 24px;
        }

        .wheel-pointer {
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 22px solid var(--accent);
            z-index: 3;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.15));
        }

        .wheel-disc-wrap {
            position: absolute;
            inset: 12px;
            border-radius: 50%;
            border: 4px solid var(--stroke);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .wheel-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            will-change: transform;
            position: relative;
        }

        .wheel-labels {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .wheel-label {
            position: absolute;
            left: 50%;
            top: 50%;
            text-align: center;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.12;
            transform-origin: center center;
            white-space: normal;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            word-break: break-word;
            hyphens: auto;
            padding: 0 2px;
        }

        .wheel-spin-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 3px solid var(--stroke);
            background: var(--card);
            color: var(--text);
            font-weight: 800;
            font-size: 0.95rem;
            box-shadow: var(--shadow);
            cursor: var(--cursor-heart);
        }

        .wheel-spin-center:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .wheel-result {
            display: none;
            text-align: center;
            padding: 24px 16px;
            border-radius: 14px;
            background: var(--accentSoft);
            border: 1px solid var(--stroke);
            margin-bottom: 20px;
        }

        .wheel-result.is-visible {
            display: block;
        }

        .wheel-result-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .wheel-result-phrase {
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1.35;
            margin-bottom: 18px;
        }

        .wheel-result-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .date-card .card-meta {
                flex-wrap: wrap;
            }
            
            .detail-view {
                padding: 20px;
            }

            .wheel-view {
                padding: 20px;
            }

            .wheel-label {
                font-size: 0.58rem;
                line-height: 1.1;
            }

            .wheel-spin-center {
                width: 76px;
                height: 76px;
                font-size: 0.85rem;
            }

            .toolbar {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-anim" aria-hidden="true">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-text">
                <h1>Find a Date Spot in Pune</h1>
                <p class="subtitle">Search by area, vibe, and budget, save your favorites for later <3 </p>
            </div>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
                <span class="theme-dot" aria-hidden="true"></span>
                <span id="themeToggleLabel">Dark</span>
            </button>
        </header>

        <div class="filter-section">
            <div class="toolbar">
                <input type="text"
                       class="filter-input"
                       id="queryFilter"
                       placeholder="Search by place or area (e.g., Koregaon Park, rooftop...)"
                       autocomplete="off">

                <select class="filter-input" id="typeFilter">
                    <option value="">Vibe (any)</option>
                    <option value="romantic">💕 Romantic</option>

        function spotsMatchingTypes(types) {
            const allowed = Array.isArray(types) ? types : [];
            return dateIdeas.filter(idea => allowed.includes(idea.type));
        }

        function pickRandomSpotForActivity(entry) {
            const pool = spotsMatchingTypes(entry.types);
            if (pool.length === 0) return null;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function validateWheelActivities() {
            for (let i = 0; i < wheelActivities.length; i++) {
                const entry = wheelActivities[i];
                const pool = spotsMatchingTypes(entry.types);
                if (pool.length === 0) {
                    console.warn(

                    );

        // APPLICATION CODE - NO NEED TO EDIT BELOW
        // ========================================
        let currentData = [...dateIdeas];
        let onlyFavorites = false;
        let wheelRotationDeg = 0;
        let wheelIsSpinning = false;
        let lastWheelWinIndex = null;
        let lastWheelSpotId = null;

        const WHEEL_SLICE_COLORS = [
            'rgba(255, 61, 110, 0.22)',
            'rgba(16, 17, 20, 0.06)',
            'rgba(255, 61, 110, 0.14)',
            'rgba(16, 17, 20, 0.10)'
        ];

        function hideBrowseChrome() {
            document.getElementById('cardsContainer').style.display = 'none';
            document.querySelector('.filter-section').style.display = 'none';
        }

        function buildWheelVisual() {
            const disc = document.getElementById('wheelDisc');
            const labelsEl = document.getElementById('wheelLabels');
            if (!disc || !labelsEl || wheelActivities.length === 0) return;

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const sliceColors = isDark
                ? [
                    'rgba(255, 77, 125, 0.28)',
                    'rgba(243, 245, 247, 0.10)',
                    'rgba(255, 77, 125, 0.18)',
                    'rgba(243, 245, 247, 0.06)'
                ]
                : WHEEL_SLICE_COLORS;

            const n = wheelActivities.length;
            const slice = 360 / n;
            const stops = [];
            for (let i = 0; i < n; i++) {
                const start = i * slice;
                const end = (i + 1) * slice;
                const color = sliceColors[i % sliceColors.length];
                stops.push(`${color} ${start}deg ${end}deg`);
            }
            disc.style.background = `conic-gradient(from -90deg, ${stops.join(', ')})`;

            const labelRadius = 'min(31vw, 142px)';
            const labelRadiusFrac = 0.72;
            const halfSliceRad = (slice / 2) * (Math.PI / 180);
            const maxWidthPct = Math.max(8, labelRadiusFrac * 2 * Math.sin(halfSliceRad) * 100 * 0.88);
            const labelFontRem = n > 14 ? 0.58 : n > 10 ? 0.64 : 0.72;

            labelsEl.innerHTML = wheelActivities.map((entry, i) => {
                const bisector = i * slice + slice / 2;
                const name = escapeHTML(wheelActivityLabel(entry));
                return `<span class="wheel-label" style="font-size:${labelFontRem}rem;max-width:${maxWidthPct.toFixed(2)}%;transform:translate(-50%,-50%) rotate(${bisector}deg) translateY(calc(-1 * ${labelRadius})) rotate(90deg);">${name}</span>`;
            }).join('');
        }

        function resetWheelResultUI() {
            const result = document.getElementById('wheelResult');
            if (result) result.classList.remove('is-visible');
            lastWheelWinIndex = null;
            lastWheelSpotId = null;
        }

        function showWheelResultForIndex(index) {
            const entry = wheelActivities[index];
            if (!entry) return;
            const spot = pickRandomSpotForActivity(entry);
            lastWheelWinIndex = index;
            lastWheelSpotId = spot ? spot.id : null;
            const phrase = document.getElementById('wheelResultPhrase');
            if (phrase) {
                if (!spot) {
                    phrase.textContent = `${entry.activity} — no matching spot in the list yet`;
                } else {
                    phrase.textContent = `${entry.activity} at ${spot.name}`;
                }
            }
            const result = document.getElementById('wheelResult');
            if (result) result.classList.add('is-visible');
        }

        function prefersReducedMotion() {
            return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }

        function spinWheel() {
            if (wheelIsSpinning || wheelActivities.length === 0) return;

            const disc = document.getElementById('wheelDisc');
            const spinBtn = document.getElementById('wheelSpinBtn');
            if (!disc || !spinBtn) return;

            wheelIsSpinning = true;
            spinBtn.disabled = true;
            resetWheelResultUI();

            const n = wheelActivities.length;
            const sliceDeg = 360 / n;
            const winIndex = Math.floor(Math.random() * n);
            const extraSpins = 4 + Math.floor(Math.random() * 3);
            const desiredMod = (360 - winIndex * sliceDeg - sliceDeg / 2 + 360) % 360;
            const currentMod = ((wheelRotationDeg % 360) + 360) % 360;
            let diff = desiredMod - currentMod;
            if (diff <= 0) diff += 360;
            wheelRotationDeg = wheelRotationDeg + extraSpins * 360 + diff;

            const finish = () => {
                wheelIsSpinning = false;
                spinBtn.disabled = false;
                showWheelResultForIndex(winIndex);
            };

            if (prefersReducedMotion()) {
                disc.style.transition = 'none';
                disc.style.transform = `rotate(${wheelRotationDeg}deg)`;
                finish();
                return;
            }

            disc.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
            disc.style.transform = `rotate(${wheelRotationDeg}deg)`;

            const onEnd = (e) => {
                if (e.propertyName !== 'transform') return;
                disc.removeEventListener('transitionend', onEnd);
                finish();
            };
            disc.addEventListener('transitionend', onEnd);
        }

        function showWheelView() {
            buildWheelVisual();
            resetWheelResultUI();
            hideBrowseChrome();
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('wheelView').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initWheelView() {
            validateWheelActivities();
            buildWheelVisual();

            const spinBtn = document.getElementById('wheelSpinBtn');
            const backBtn = document.getElementById('wheelBackBtn');
            const browseBtn = document.getElementById('wheelBrowseBtn');
            const spinAgainBtn = document.getElementById('wheelSpinAgainBtn');
            const viewSpotBtn = document.getElementById('wheelViewSpotBtn');

            if (spinBtn) spinBtn.addEventListener('click', spinWheel);
            if (backBtn) backBtn.addEventListener('click', showCardView);
            if (browseBtn) browseBtn.addEventListener('click', showCardView);
            if (spinAgainBtn) spinAgainBtn.addEventListener('click', () => {
                resetWheelResultUI();
            });
            if (viewSpotBtn) viewSpotBtn.addEventListener('click', () => {
                if (lastWheelSpotId == null) return;
                showDetail(lastWheelSpotId);
            });
        }

        function storageGetJSON(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return fallback;
                return JSON.parse(raw);
            } catch {
                return fallback;
            }
        }

        function storageSetJSON(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch {
                // ignore
            }
        }

        function getFavoritesSet() {
            const ids = storageGetJSON('puneDateFavorites', []);
            return new Set(Array.isArray(ids) ? ids : []);
        }

        function setFavoritesSet(favs) {
            storageSetJSON('puneDateFavorites', Array.from(favs));
        }

        function isFav(id) {
            return getFavoritesSet().has(id);
        }

        function toggleFav(id) {
            const favs = getFavoritesSet();
            if (favs.has(id)) favs.delete(id);
            else favs.add(id);
            setFavoritesSet(favs);
            applyFilters();
        }

        function escapeHTML(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function ideaBestTimeLabel(idea) {
            const bestTime = Array.isArray(idea.bestTime) ? idea.bestTime : [];
            if (bestTime.length === 0) return 'Any time';
            return bestTime.map(t => t[0].toUpperCase() + t.slice(1)).join(', ');
        }

        function ideaBudgetLabel(idea) {
            return idea.budget || '—';
        }

        function mapUrlForIdea(idea) {
            const q = `${idea.name}, ${idea.area}, Pune`;
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
        }

        function mapEmbedUrlForIdea(idea) {
            const q = `${idea.name}, ${idea.area}, Pune`;
            return `https://www.google.com/maps?q=${encodeURIComponent(q)}&output=embed`;
        }

        function googleImagesUrlForIdea(idea) {
            const q = `${idea.name} ${idea.area} Pune`;
            return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q)}`;
        }

        function cardBannerHtml(idea) {
            const photo = idea.photos && idea.photos[0];
            const alt = escapeHTML(idea.name);
            const imgHtml = photo
                ? `<img class="card-banner-img" src="${escapeHTML(photo)}" alt="${alt}" loading="lazy" onerror="this.style.display='none'">`
                : '';
            return `
                <div class="card-banner">
                    <div class="card-banner-fallback" aria-hidden="true"></div>
                    ${imgHtml}
                    <span class="card-type card-type--overlay">${escapeHTML(idea.type)}</span>
                </div>
            `;
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const favs = getFavoritesSet();
            container.innerHTML = currentData.map(idea => `
                <div class="date-card ${idea.type}" onclick="showDetail(${idea.id})">
                    ${cardBannerHtml(idea)}
                    <div class="card-body">
                        <div class="card-header">
                            <h2 class="card-title">${idea.name}</h2>
                            <button
                                class="fav-button ${favs.has(idea.id) ? 'is-fav' : ''}"
                                onclick="event.stopPropagation(); toggleFav(${idea.id});"
                                title="${favs.has(idea.id) ? 'Remove from favorites' : 'Save to favorites'}"
                                aria-label="${favs.has(idea.id) ? 'Remove from favorites' : 'Save to favorites'}"
                                type="button"
                            >♥</button>
                        </div>
                        <p class="card-description">${idea.description}</p>
                        <div class="card-meta">
                            <span class="badge">📍 ${idea.area}</span>
                            <span class="badge">💸 ${ideaBudgetLabel(idea)}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            const resultsCount = document.getElementById('resultsCount');
            if (resultsCount) resultsCount.textContent = String(currentData.length);
        }

        function showDetail(id) {
            const idea = dateIdeas.find(d => d.id === id);
            if (!idea) return;

            const detailContent = document.getElementById('detailContent');
            const fav = isFav(idea.id);
            
            // Build photos HTML
            let photosHTML = '';
            if (idea.photos && idea.photos.length > 0) {
                photosHTML = `
                    <div class="photo-gallery">
                        ${idea.photos.map(photo => `
                            <div class="photo-item">
                                <img src="${photo}" alt="${idea.name}" 
                                     onerror="this.parentElement.innerHTML='<div class=\'photo-placeholder\'>Photo not available</div>'">
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                photosHTML = '<div class="photo-placeholder">No photos in-page yet</div>';
            }

            const tips = Array.isArray(idea.tips) ? idea.tips : [];
            const tipsHTML = tips.length
                ? `<ul style="margin-left: 18px; color: #636e72; line-height: 1.8;">${tips.map(t => `<li>${escapeHTML(t)}</li>`).join('')}</ul>`
                : `<p style="color: #636e72; line-height: 1.8;">No extra tips—just show up and enjoy.</p>`;

            detailContent.innerHTML = `
                <span class="card-type ${idea.type}">${idea.type}</span>
                <h1 class="detail-title">${idea.name}</h1>
                <p class="detail-blurb">${idea.blurb}</p>

                <div class="detail-actions">
                    <a class="button link-button" href="${mapUrlForIdea(idea)}" target="_blank" rel="noreferrer">Open in Maps</a>
                    <button class="button ghost" type="button" onclick="toggleFav(${idea.id})">${fav ? 'Saved ♥' : 'Save ♥'}</button>
                </div>
                
                <div class="detail-grid">
                    <div class="detail-section">
                        <h3>🧭 Quick info</h3>
                        <div class="card-meta" style="margin-top: 0;">
                            <span class="badge">📍 ${idea.area}</span>
                            <span class="badge">💸 ${ideaBudgetLabel(idea)}</span>
                            <span class="badge">🕒 ${ideaBestTimeLabel(idea)}</span>
                            <span class="badge">⏱️ ${idea.duration || '—'}</span>
                        </div>
                        <div style="margin-top: 14px;">
                            <h3 style="margin-bottom: 10px;">💡 Tips</h3>
                            ${tipsHTML}
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <div class="photos-links">
                            <a href="${googleImagesUrlForIdea(idea)}" target="_blank" rel="noreferrer">View on Google Images</a>
                        </div>
                        ${photosHTML}
                        <div class="maps-preview" aria-label="Map preview">
                            <iframe
                                src="${mapEmbedUrlForIdea(idea)}"
                                loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade"
                                title="Map preview for ${escapeHTML(idea.name)}"
                            ></iframe>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('cardsContainer').style.display = 'none';
            document.querySelector('.filter-section').style.display = 'none';
            document.getElementById('wheelView').classList.remove('active');
            document.getElementById('detailView').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showCardView() {
            document.getElementById('cardsContainer').style.display = 'grid';
            document.querySelector('.filter-section').style.display = 'block';
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('wheelView').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Filter functionality
        function applyFilters() {
            const typeFilter = document.getElementById('typeFilter').value.toLowerCase();
            const budgetFilter = document.getElementById('budgetFilter').value;
            const timeFilter = document.getElementById('timeFilter').value.toLowerCase();
            const query = document.getElementById('queryFilter').value.toLowerCase().trim();
            const favs = getFavoritesSet();
            
            currentData = dateIdeas.filter(idea => {
                const matchesType = !typeFilter || idea.type === typeFilter;

                const matchesBudget = !budgetFilter || (idea.budget || '') === budgetFilter;

                const bestTime = Array.isArray(idea.bestTime) ? idea.bestTime : [];
                const matchesTime = !timeFilter || bestTime.includes(timeFilter);

                const haystack = `${idea.name} ${idea.area} ${idea.description} ${idea.blurb}`.toLowerCase();
                const matchesQuery = !query || haystack.includes(query);

                const matchesFavs = !onlyFavorites || favs.has(idea.id);
                
                return matchesType && matchesBudget && matchesTime && matchesQuery && matchesFavs;
            });
            
            renderCards();
        }

        document.getElementById('queryFilter').addEventListener('input', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('budgetFilter').addEventListener('change', applyFilters);
        document.getElementById('timeFilter').addEventListener('change', applyFilters);

        document.getElementById('showAllBtn').addEventListener('click', () => {
            onlyFavorites = false;
            document.getElementById('toggleFavsBtn').textContent = 'Favorites';
            applyFilters();
        });

        document.getElementById('toggleFavsBtn').addEventListener('click', () => {
            onlyFavorites = !onlyFavorites;
            document.getElementById('toggleFavsBtn').textContent = onlyFavorites ? 'Showing favorites' : 'Favorites';
            applyFilters();
        });

        document.getElementById('randomBtn').addEventListener('click', () => {
            const randomBtn = document.getElementById('randomBtn');
            randomBtn.classList.remove('surprise-burst');
            void randomBtn.offsetWidth;
            randomBtn.classList.add('surprise-burst');

            const openWheel = () => {
                randomBtn.classList.remove('surprise-burst');
                showWheelView();
            };

            if (prefersReducedMotion()) {
                openWheel();
                return;
            }

            randomBtn.addEventListener('animationend', openWheel, { once: true });
        });

        function setTheme(theme) {
            const root = document.documentElement;
            if (theme === 'dark') root.setAttribute('data-theme', 'dark');
            else root.removeAttribute('data-theme');

            const label = document.getElementById('themeToggleLabel');
            if (label) label.textContent = theme === 'dark' ? 'Light' : 'Dark';

            const btn = document.getElementById('themeToggle');
            if (btn) btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
        }

        function getPreferredTheme() {
            const saved = storageGetJSON('puneDateTheme', null);
            if (saved === 'dark' || saved === 'light') return saved;
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function initThemeToggle() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;

            setTheme(getPreferredTheme());

            btn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
                const next = current === 'dark' ? 'light' : 'dark';
                storageSetJSON('puneDateTheme', next);
                setTheme(next);
                if (document.getElementById('wheelView')?.classList.contains('active')) {
                    buildWheelVisual();
                }
            });
        }

        // Initial render
        initThemeToggle();
        initWheelView();
        renderCards();
    </script>
</body>
</html>
