        input, textarea {

        }

        }

        body {

            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
        }

        header {

        }

        h1 {

        }

        .subtitle {

            color: var(--muted);
        }

            margin-bottom: 30px;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);

            grid-template-columns: 2.2fr 1fr 1fr 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .meta-row {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
            font-weight: 650;
            font-size: 0.95em;
        }

        .button {
            appearance: none;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            padding: 12px 14px;
            font-weight: 700;
            background: var(--accent);
            color: white;
            transition: transform 0.08s ease, background 0.2s ease;
            white-space: nowrap;
        }

        .button:hover {
            background: #ff2a61;
        }

        .button:active {
            transform: translateY(1px);
        }

        .button.ghost {
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
        }

        .filter-input {
            width: 100%;
            padding: 13px 14px;
            font-size: 1.02em;
            border: 1px solid var(--stroke);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            background: white;
        }

        .filter-input:focus {
            border-color: rgba(255, 61, 110, 0.6);
            box-shadow: 0 0 0 4px var(--accentSoft);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .date-card {
            background: var(--card);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--stroke);
            box-shadow: 0 2px 10px rgba(16, 17, 20, 0.05);
            position: relative;
        }

        .date-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .card-type {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.02em;
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
        }

        .card-title {
            font-size: 1.5em;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .card-description {
            color: var(--muted);
            line-height: 1.6;
        }

        .card-meta {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
            font-weight: 650;
            font-size: 0.9em;
        }

        .fav-button {
            position: absolute;
            top: 14px;
            right: 14px;
            border: none;
            border-radius: 999px;
            width: 42px;
            height: 42px;
            cursor: pointer;
            background: #f1f3f5;
            color: #2d3436;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.08s ease, background 0.2s ease;
        }

        .fav-button:hover {
            background: var(--accentSoft);
        }

        .fav-button:active {
            transform: translateY(1px);
        }

        .fav-button.is-fav {
            background: var(--accentSoft);
            color: var(--accent);
        }

        .detail-view {
            display: none;
            background: var(--card);
            border-radius: 15px;
            padding: 40px;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
        }

        .detail-view.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-button {
            background: rgba(16, 17, 20, 0.06);
            color: var(--text);
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 25px;
            transition: background 0.2s ease, transform 0.08s ease;
        }

        .back-button:hover {
            background: rgba(16, 17, 20, 0.10);
        }

        .back-button:active {
            transform: translateY(1px);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 25px;

            background: rgba(16, 17, 20, 0.04);

            border-radius: 10px;
            border: 1px solid rgba(16, 17, 20, 0.06);

            font-size: 1.2em;

            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

            overflow: hidden;
            border: 1px solid rgba(16, 17, 20, 0.08);

            height: 200px;

            display: block;
        }

            justify-content: center;

            display: block;

            }
            
            .detail-view {

            }

            .toolbar {
                grid-template-columns: 1fr !important;
            }
        }

</head>

                    <option value="romantic">💕 Romantic</option>

                    <option value="relaxing">😌 Relaxing</option>
                    <option value="cultural">🎨 Cultural</option>
                    <option value="adventure">🏔️ Adventure</option>
                </select>

                <select class="filter-input" id="budgetFilter">
                    <option value="">Budget (any)</option>
                    <option value="₹">₹ (cheap)</option>
                    <option value="₹₹">₹₹ (mid)</option>
                    <option value="₹₹₹">₹₹₹ (splurge)</option>
                </select>

                <select class="filter-input" id="timeFilter">
                    <option value="">Best time (any)</option>
                    <option value="morning">Morning</option>
                    <option value="afternoon">Afternoon</option>
                    <option value="evening">Evening</option>
                    <option value="night">Night</option>
                </select>

                <button class="button ghost" id="randomBtn" type="button">Surprise me</button>
            </div>

            <div class="meta-row">
                <span class="pill"><span id="resultsCount">0</span> spots</span>
                <div style="display:flex; gap: 10px; flex-wrap: wrap;">
                    <button class="button ghost" id="showAllBtn" type="button">Show all</button>
                    <button class="button" id="toggleFavsBtn" type="button">Favorites</button>
                </div>
            </div>
        </div>

        <div id="cardsContainer" class="cards-grid">
            <!-- Cards will be inserted here -->
        </div>

        <div id="detailView" class="detail-view">
            <button class="back-button" onclick="showCardView()">← back</button>
            <div id="detailContent">
                <!-- Detail content will be inserted here -->
            </div>
        </div>
    </div>

                blurb: "An artsy, calm date idea—great for chatting about what you like without it turning into an interview.",

                blurb: "A slower, more ‘experience’ date—take your time, then end with dessert or dinner nearby.",
                budget: "₹",
                bestTime: ["afternoon", "evening"],
                duration: "1.5–3 hrs",
                photos: [],

            },
            {
                id: 28,
                name: "Darpan Art Gallery",
                type: "cultural",
                area: "Senapati Bapat Rd",
                description: "Art Gallery",
                blurb: "A simple art-stop date—easy to pair with coffee, dinner, or a walk right after.",
                budget: "₹",
                bestTime: ["afternoon", "evening"],
                duration: "45–90 mins",
                photos: [],
                outfitColors: ["#FF6B6B", "#F7B731", "#FFFFFF"]
            },
            {
                id: 29,
                name: "Raja Ravi Varma Art Gallery",
                type: "cultural",
                area: "Shivaji Nagar",
                description: "Art Gallery",
                blurb: "If you both like quiet, this is a calm plan—great as a pre-dinner activity.",
                budget: "₹",
                bestTime: ["afternoon", "evening"],
                duration: "45–90 mins",
                photos: [],
                outfitColors: ["#FF6B6B", "#F7B731", "#FFFFFF"]
            }
        ];

        // Keep the data model minimal (no outfit colors).
        for (const idea of dateIdeas) delete idea.outfitColors;

        // ========================================
        // APPLICATION CODE - NO NEED TO EDIT BELOW
        // ========================================
        let currentData = [...dateIdeas];
        let onlyFavorites = false;

        function storageGetJSON(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return fallback;
                return JSON.parse(raw);
            } catch {
                return fallback;
            }
        }

        function storageSetJSON(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch {
                // ignore
            }
        }

        function getFavoritesSet() {
            const ids = storageGetJSON('puneDateFavorites', []);
            return new Set(Array.isArray(ids) ? ids : []);
        }

        function setFavoritesSet(favs) {
            storageSetJSON('puneDateFavorites', Array.from(favs));
        }

        function isFav(id) {
            return getFavoritesSet().has(id);
        }

        function toggleFav(id) {
            const favs = getFavoritesSet();
            if (favs.has(id)) favs.delete(id);
            else favs.add(id);
            setFavoritesSet(favs);
            applyFilters();
        }

        function escapeHTML(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function ideaBestTimeLabel(idea) {
            const bestTime = Array.isArray(idea.bestTime) ? idea.bestTime : [];
            if (bestTime.length === 0) return 'Any time';
            return bestTime.map(t => t[0].toUpperCase() + t.slice(1)).join(', ');
        }

        function ideaBudgetLabel(idea) {
            return idea.budget || '—';
        }

        function mapUrlForIdea(idea) {
            const q = `${idea.name}, ${idea.area}, Pune`;
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
        }

        function mapEmbedUrlForIdea(idea) {
            const q = `${idea.name}, ${idea.area}, Pune`;
            return `https://www.google.com/maps?q=${encodeURIComponent(q)}&output=embed`;
        }

        function googleImagesUrlForIdea(idea) {
            const q = `${idea.name} ${idea.area} Pune`;
            return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q)}`;
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const favs = getFavoritesSet();
            container.innerHTML = currentData.map(idea => `
                <div class="date-card ${idea.type}" onclick="showDetail(${idea.id})">
                    <span class="card-type">${idea.type}</span>
                    <button
                        class="fav-button ${favs.has(idea.id) ? 'is-fav' : ''}"
                        onclick="event.stopPropagation(); toggleFav(${idea.id});"
                        title="${favs.has(idea.id) ? 'Remove from favorites' : 'Save to favorites'}"
                        aria-label="${favs.has(idea.id) ? 'Remove from favorites' : 'Save to favorites'}"
                        type="button"
                    >♥</button>
                    <h2 class="card-title">${idea.name}</h2>
                    <p class="card-description">${idea.description}</p>
                    <div class="card-meta">
                        <span class="badge">📍 ${idea.area}</span>
                        <span class="badge">💸 ${ideaBudgetLabel(idea)}</span>
                        <span class="badge">🕒 ${ideaBestTimeLabel(idea)}</span>
                    </div>
                </div>
            `).join('');

            const resultsCount = document.getElementById('resultsCount');
            if (resultsCount) resultsCount.textContent = String(currentData.length);
        }

        function showDetail(id) {
            const idea = dateIdeas.find(d => d.id === id);
            if (!idea) return;

            const detailContent = document.getElementById('detailContent');
            const fav = isFav(idea.id);
            
            // Build photos HTML
            let photosHTML = '';
            if (idea.photos && idea.photos.length > 0) {
                photosHTML = `
                    <div class="photo-gallery">
                        ${idea.photos.map(photo => `
                            <div class="photo-item">
                                <img src="${photo}" alt="${idea.name}" 
                                     onerror="this.parentElement.innerHTML='<div class=\'photo-placeholder\'>Photo not available</div>'">
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                photosHTML = '<div class="photo-placeholder">No photos in-page yet</div>';
            }

            const tips = Array.isArray(idea.tips) ? idea.tips : [];
            const tipsHTML = tips.length
                ? `<ul style="margin-left: 18px; color: #636e72; line-height: 1.8;">${tips.map(t => `<li>${escapeHTML(t)}</li>`).join('')}</ul>`
                : `<p style="color: #636e72; line-height: 1.8;">No extra tips—just show up and enjoy.</p>`;

            detailContent.innerHTML = `
                <span class="card-type ${idea.type}">${idea.type}</span>
                <h1 class="detail-title">${idea.name}</h1>
                <p class="detail-blurb">${idea.blurb}</p>

                <div class="detail-actions">
                    <a class="button link-button" href="${mapUrlForIdea(idea)}" target="_blank" rel="noreferrer">Open in Maps</a>
                    <button class="button ghost" type="button" onclick="toggleFav(${idea.id})">${fav ? 'Saved ♥' : 'Save ♥'}</button>
                </div>
                
                <div class="detail-grid">
                    <div class="detail-section">
                        <h3>🧭 Quick info</h3>
                        <div class="card-meta" style="margin-top: 0;">
                            <span class="badge">📍 ${idea.area}</span>
                            <span class="badge">💸 ${ideaBudgetLabel(idea)}</span>
                            <span class="badge">🕒 ${ideaBestTimeLabel(idea)}</span>
                            <span class="badge">⏱️ ${idea.duration || '—'}</span>
                        </div>
                        <div style="margin-top: 14px;">
                            <h3 style="margin-bottom: 10px;">💡 Tips</h3>
                            ${tipsHTML}
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>📸 Photos</h3>
                        <div class="photos-links">
                            <a href="${googleImagesUrlForIdea(idea)}" target="_blank" rel="noreferrer">View on Google Images</a>
                        </div>
                        ${photosHTML}
                        <div class="maps-preview" aria-label="Map preview">
                            <iframe
                                src="${mapEmbedUrlForIdea(idea)}"
                                loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade"
                                title="Map preview for ${escapeHTML(idea.name)}"
                            ></iframe>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('cardsContainer').style.display = 'none';
            document.querySelector('.filter-section').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showCardView() {
            document.getElementById('cardsContainer').style.display = 'grid';
            document.querySelector('.filter-section').style.display = 'block';
            document.getElementById('detailView').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Filter functionality
        function applyFilters() {
            const typeFilter = document.getElementById('typeFilter').value.toLowerCase();
            const budgetFilter = document.getElementById('budgetFilter').value;
            const timeFilter = document.getElementById('timeFilter').value.toLowerCase();
            const query = document.getElementById('queryFilter').value.toLowerCase().trim();
            const favs = getFavoritesSet();
            
            currentData = dateIdeas.filter(idea => {
                const matchesType = !typeFilter || idea.type === typeFilter;

                const matchesBudget = !budgetFilter || (idea.budget || '') === budgetFilter;

                const bestTime = Array.isArray(idea.bestTime) ? idea.bestTime : [];
                const matchesTime = !timeFilter || bestTime.includes(timeFilter);

                const haystack = `${idea.name} ${idea.area} ${idea.description} ${idea.blurb}`.toLowerCase();
                const matchesQuery = !query || haystack.includes(query);

                const matchesFavs = !onlyFavorites || favs.has(idea.id);
                
                return matchesType && matchesBudget && matchesTime && matchesQuery && matchesFavs;
            });
            
            renderCards();
        }

        document.getElementById('queryFilter').addEventListener('input', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('budgetFilter').addEventListener('change', applyFilters);
        document.getElementById('timeFilter').addEventListener('change', applyFilters);

        document.getElementById('showAllBtn').addEventListener('click', () => {
            onlyFavorites = false;
            document.getElementById('toggleFavsBtn').textContent = 'Favorites';
            applyFilters();
        });

        document.getElementById('toggleFavsBtn').addEventListener('click', () => {
            onlyFavorites = !onlyFavorites;
            document.getElementById('toggleFavsBtn').textContent = onlyFavorites ? 'Showing favorites' : 'Favorites';
            applyFilters();
        });

        document.getElementById('randomBtn').addEventListener('click', () => {
            applyFilters();
            if (currentData.length === 0) return;
            const pick = currentData[Math.floor(Math.random() * currentData.length)];
            showDetail(pick.id);
        });

        // Initial render
        renderCards();
    </script>
